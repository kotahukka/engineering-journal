---
name: AI Review Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  ai_review_command:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ai review')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: pr
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Build review bundle (changed files, filtered)
        id: bundle
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const { owner, repo } = context.repo;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber, per_page: 100
            });

            const allow = (p) => {
              if (p.startsWith(".github/")) return true;
              if (p.startsWith("templates/")) return true;

              const rootAllow = new Set([
                "mkdocs.yml",
                ".pre-commit-config.yaml",
                ".markdownlint.json",
                ".markdownlintignore",
                ".yamllint",
                "yamllint.yml",
                "yamllint.yaml",
                "CODEOWNERS",
                "LICENSE",
                "CONTRIBUTING.md",
                "SECURITY.md",
                "STYLE_GUIDE.md",
                "CHANGELOG.md",
                "CITATION.cff"
              ]);
              if (rootAllow.has(p)) return true;

              if (!p.endsWith(".md")) return true;
              return false;
            };

            const deny = (p) => {
              if (p.startsWith("docs/")) return true;
              if (p.startsWith("after-action-reports/")) return true;
              if (p.startsWith("labs/")) return true;
              if (p.startsWith("networking/")) return true;
              if (p.startsWith("cybersecurity/")) return true;
              if (p.startsWith("system-administration/")) return true;
              return false;
            };

            const included = files.filter(f => allow(f.filename) && !deny(f.filename));

            const header = [
              `PR #${prNumber}: ${pr.data.title}`,
              `Included files: ${included.length} / ${files.length}`,
              `Note: patches may be missing for large/binary files.`
            ].join("\n");

            let reviewText = header + "\n\n";
            let addedLines = "";

            for (const f of included) {
              reviewText += `\n---\n### ${f.filename}\n`;
              reviewText += `- status: ${f.status}\n`;
              reviewText += `- additions: ${f.additions}, deletions: ${f.deletions}\n\n`;

              if (typeof f.patch === "string" && f.patch.length > 0) {
                reviewText += "```diff\n" + f.patch + "\n```\n";
                const patchLines = f.patch.split("\n");
                for (const line of patchLines) {
                  if (line.startsWith("+") && !line.startsWith("+++")) {
                    addedLines += line + "\n";
                  }
                }
              } else {
                reviewText += "_Patch not available (binary or too large)._ \n";
              }
            }

            const b64 = (s) => Buffer.from(s, "utf8").toString("base64");
            core.setOutput("review_b64", b64(reviewText));
            core.setOutput("added_b64", b64(addedLines));

      - name: Get PR base SHA
        id: prmeta
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const { owner, repo } = context.repo;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            core.setOutput("base_sha", pr.data.base.sha);

      - name: Download reviewer script + prompts from PR head
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            async function getFile(path) {
              const res = await github.rest.repos.getContent({
                owner, repo, path, ref: pr.head.sha
              });
              if (Array.isArray(res.data)) throw new Error(`Expected file, got directory: ${path}`);
              const content = Buffer.from(res.data.content, res.data.encoding).toString("utf8");
              return content;
            }

            const fs = require("fs");
            fs.mkdirSync(".github/scripts", { recursive: true });
            fs.mkdirSync(".github/prompts", { recursive: true });

            fs.writeFileSync(".github/scripts/openai_review.py", await getFile(".github/scripts/openai_review.py"), "utf8");
            fs.writeFileSync(".github/prompts/openai_review.md", await getFile(".github/prompts/openai_review.md"), "utf8");
            fs.writeFileSync(".github/prompts/openai_review_security.md", await getFile(".github/prompts/openai_review_security.md"), "utf8");

      - name: Checkout base (safe)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prmeta.outputs.base_sha }}

      - name: Decode bundle
        run: |
          echo "${{ steps.bundle.outputs.review_b64 }}" | base64 -d > review_input.txt || true
          echo "${{ steps.bundle.outputs.added_b64 }}"  | base64 -d > added_lines.txt || true

      - name: Secret sniff (precise; ignore 'redacted')
        run: |
          set -euo pipefail
          added="$(cat added_lines.txt 2>/dev/null || true)"

          patterns=(
            'AKIA[0-9A-Z]{16}'
            'ASIA[0-9A-Z]{16}'
            'ghp_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{20,}'
            'glpat-[A-Za-z0-9_\-]{20,}'
            'xox[baprs]-[A-Za-z0-9-]{10,}'
            'AIzaSy[A-Za-z0-9_\-]{33}'
            'sk_live_[A-Za-z0-9]{20,}'
            'rk_live_[A-Za-z0-9]{20,}'
            '-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'
          )

          hits=""
          for p in "${patterns[@]}"; do
            m="$(printf '%s\n' "$added" | grep -P -n "$p" || true)"
            if [ -n "$m" ]; then
              hits="${hits}\n${m}"
            fi
          done

          filtered="$(printf '%b\n' "$hits" | sed '/^$/d' | grep -vi 'redacted' || true)"

          if [ -n "$filtered" ]; then
            {
              echo "## Summary"
              echo "- ❌ Potential secret detected in added lines (filtered bundle)."
              echo
              echo "## High priority"
              echo "- [HIGH] High-confidence secret-like token/key material detected (excluding lines containing 'redacted')."
              echo
              echo "### Evidence (line numbers refer to added-lines stream)"
              echo '```'
              printf '%s\n' "$filtered"
              echo '```'
              echo
              echo "## Recommended fix"
              echo "- Remove from the PR, store in GitHub Secrets, and re-run."
              echo "- If real, rotate/revoke immediately."
            } > review.md
            exit 1
          fi

      - name: Run OpenAI review (filtered bundle; soft block on [HIGH])
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
          REVIEW_TEXT_B64: ${{ steps.bundle.outputs.review_b64 }}
        run: |
          set -euo pipefail

          if [ -f review.md ]; then
            echo "review.md created by secret sniff; skipping OpenAI."
            exit 0
          fi

          echo "$REVIEW_TEXT_B64" | base64 -d > review_input.txt
          export REVIEW_TEXT="$(cat review_input.txt)"

          python3 .github/scripts/openai_review.py > review.md

          if grep -q '\[HIGH\]' review.md; then
            exit 1
          fi

      - name: Comment review on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const { owner, repo } = context.repo;

            let body = "## Summary\n- No review output.";
            try { body = fs.readFileSync('review.md','utf8').trim() || body; } catch(e) {}

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });
