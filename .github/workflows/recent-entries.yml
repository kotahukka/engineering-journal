name: Update Recent Entries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build recent entries list
        run: |
          python - <<'PY'
          import pathlib, re

          ROOT = pathlib.Path("docs")
          files = []
          for p in ROOT.rglob("*.md"):
            if p.name == "index.md":
              continue
            files.append((p.stat().st_mtime, p))

          files.sort(reverse=True)
          files = files[:8]

          def title_of(path: pathlib.Path) -> str:
            text = path.read_text(encoding="utf-8", errors="ignore")
            for line in text.splitlines():
              if line.startswith("# "):
                return line[2:].strip()
            return path.stem.replace("-", " ").title()

          lines = []
          for _, p in files:
            title = title_of(p)
            link = str(p).replace("\\", "/")
            lines.append(f"- [{title}]({link})")

          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text(encoding="utf-8", errors="ignore")

          pattern = r"<!-- RECENT_ENTRIES_START -->(.*?)<!-- RECENT_ENTRIES_END -->"
          block = "\n" + "\n".join(lines) + "\n"
          new = re.sub(pattern, f"<!-- RECENT_ENTRIES_START -->{block}<!-- RECENT_ENTRIES_END -->", readme, flags=re.S)

          readme_path.write_text(new, encoding="utf-8")
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): update recent entries"
          git push
